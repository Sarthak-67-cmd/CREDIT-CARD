<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CardZen Dashboard</title>

<link rel="stylesheet" href="dashboard.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://kit.fontawesome.com/6d2ea823d0.js" crossorigin="anonymous"></script>

</head>

<body>

<nav>

<div class="logo">
Card<span>Zen</span>
</div>

<div class="user">

<img src="https://ui-avatars.com/api/?name=User&background=D4AF37&color=000&size=128">

<span>Welcome</span>

</div>

</nav>

<section class="header">

<h1>Good Evening 👋</h1>

<p>Your Credit Dashboard</p>

</section>

<section class="summary">

<div class="box">

<h3>Total Credit Limit</h3>

<h1>₹18,50,000</h1>

</div>

<div class="box">

<h3>Cards</h3>

<h1>3</h1>

</div>

<div class="box">

<h3>Due This Month</h3>

<h1>₹24,500</h1>

</div>

</section>

<section class="cards">

<div class="credit-card">

<div class="chip"></div>

<p>•••• •••• •••• 4587</p>

<span>Limit ₹10,00,000</span>

</div>

<div class="credit-card">

<div class="chip"></div>

<p>•••• •••• •••• 7711</p>

<span>Limit ₹5,00,000</span>

</div>

<div class="credit-card">

<div class="chip"></div>

<p>•••• •••• •••• 9015</p>

<span>Limit ₹3,50,000</span>

</div>

</section>

<section class="actions">

<button id="addCard">

<i class="fas fa-plus"></i>

Add Card

</button>

<button>

<i class="fas fa-calendar"></i>

Bill Reminder

</button>

<button>

<i class="fas fa-gift"></i>

Rewards

</button>

<button>

<i class="fas fa-chart-line"></i>

Insights

</button>

</section>

<footer>

<button class="active">

<i class="fas fa-home"></i>

<p>Home</p>

</button>

<button>

<i class="fas fa-credit-card"></i>

<p>Cards</p>

</button>

<button>

<i class="fas fa-gift"></i>

<p>Rewards</p>

</button>

<button>

<i class="fas fa-user"></i>

<p>Profile</p>

</button>

</footer>

<script src="dashboard.js"></script>

</body>

</html>
